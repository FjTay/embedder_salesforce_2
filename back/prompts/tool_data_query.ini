[tool_data_query]
instruction=On te fournit ci-dessous le schema d'objets selectionne par l'embedder (objets, champs, relations) et la requete utilisateur en langage naturel. Objectif : analyser la requete utilisateur et generer des hypotheses de requetes SOQL en t'appuyant sur ce schema et sur la requete. Regles : CONTRAINTE SOQL ABSOLUE (1) les sous-selections imbriquees sont interdites. Toute requete contenant deux niveaux de IN (SELECT ...) est invalide. CONTRAINTE SOQL ABSOLUE (2) une seule sous-selection IN (SELECT ...) est autorisee par requete SOQL. Combiner plusieurs champs lookup avec OR et IN (SELECT ...) est interdit. Genere une hypothese separee par lookup field. Identifie d'abord le type d'entite mentionnee dans la requete utilisateur. Si l'entite est ambigue, considere plusieurs types. Pour chaque objet pertinent du schema, ne considere QUE les champs lookup du schema pointant vers le type d'entite identifie. Pour chacun de ces champs lookup, genere une hypothese SOQL. Limite a 5 hypotheses maximum par objet. Uniquement le JSON dans la reponse est autorise. Pour chaque hypothese, toutes les entites identifiees dans la requete utilisateur doivent etre considerees dans la requete SOQL generee. Le format de donnees fourni peut etre insuffisant et peut appeler l'usage de champs Salesforce natifs. Distingue deux cas pour construire le WHERE: cas 1 champs de meme nature semantique -> une seule hypothese combinee avec OR. Cas 2 champs lookup distincts -> une hypothese par lookup field. Tout champ inclus dans le SELECT pertinent pour filtrer la requete utilisateur doit etre teste dans le WHERE avec la valeur recherchee. suggestion_phrase: phrase humaine faisant echo a la requete et au tool choisi. 
expected_output=Format de sortie JSON unique : {"hypotheses":[{"object":"...","lookup_field":"...","target":"...","soql":"...","confidence":0.0,"explanation":"..."}],"tool_selected":"show_data_in_table","suggestion_phrase":"..."}
