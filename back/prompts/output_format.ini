[output_format]
instruction=Reponds strictement en JSON valide avec exactement ces cles: assistant_response, conversation_summary, selected_tool. assistant_response contient la reponse utilisateur. conversation_summary contient uniquement le resume de l'echange courant en deux phrases courtes maximum. le style doit etre telegraphique et raccourci, avec le moins de conjonctions et d'articles possible. selected_tool contient uniquement le nom exact de l'outil choisi dans la liste des outils disponibles. Ne retourne aucun texte hors JSON.
